version: '3.8'

services:
  bot:
    build: .
    container_name: tg-antiharassment-bot-rust
    restart: unless-stopped
    volumes:
      - ./.env:/app/.env:ro
      - ./data:/app/data
    environment:
      - RUST_LOG=info
    networks:
      - bot-network

networks:
  bot-network:
    driver: bridge
